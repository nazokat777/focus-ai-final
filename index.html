<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Focus AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030806; --elev:#081209; --elev2:#0c1a0f; --line:rgba(90,255,160,.09);
  --neon:#39FF8C; --neon-br:#7CFFB5; --neon-dp:#0E9F55; --onneon:#04130a;
  --text:#EAFBF0; --muted:#5f7a68; --danger:#ff7a7a;
  --r:20px; --nav-h:74px; --ease:cubic-bezier(.22,1,.36,1);
}
.device[data-theme="light"]{
  --bg:#f3faf5; --elev:#ffffff; --elev2:#e7f3ea; --line:rgba(14,120,70,.14);
  --neon:#0E9F55; --neon-br:#16c26c; --neon-dp:#0a7a41; --onneon:#ffffff;
  --text:#0a1f12; --muted:#5b7a66;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100%}
body{background:#000;color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input{font-family:inherit}
.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:"tnum"}

.device{position:relative;width:440px;height:min(940px,100dvh);
  background:radial-gradient(85% 55% at 50% 100%,rgba(20,80,45,.24) 0%,rgba(0,0,0,0) 60%),var(--bg);
  border-radius:46px;overflow:hidden;border:1px solid rgba(120,255,180,.10);
  box-shadow:0 40px 120px rgba(20,160,90,.22),0 8px 40px rgba(0,0,0,.6);
  display:flex;flex-direction:column;color:var(--text);transition:background .4s}
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:58;opacity:.05;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(120,255,180,.5) 2px 3px)}
.device[data-theme="light"] .scanlines{opacity:.02}
@media (max-width:480px){.device{width:100%;height:100dvh;border-radius:0;border:none;box-shadow:none}}

.head{padding:calc(env(safe-area-inset-top) + 18px) 24px 6px;flex:none;display:flex;align-items:center;justify-content:space-between;z-index:5}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.15em;font-size:14px}
.brand b{color:var(--neon)}
.dot{width:8px;height:8px;border-radius:2px;background:var(--neon);box-shadow:0 0 12px var(--neon);animation:blink 2.4s steps(1) infinite}
@keyframes blink{50%{opacity:.35}}
.clock{font-size:12px;color:var(--muted)}
.clock::after{content:"_";color:var(--neon);animation:blink 1s steps(1) infinite}

.views{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:4px 20px calc(var(--nav-h) + 28px);
  opacity:0;transform:translateY(12px);pointer-events:none;transition:opacity .4s var(--ease),transform .4s var(--ease);scrollbar-width:none}
.view::-webkit-scrollbar{display:none}
.view.active{opacity:1;transform:none;pointer-events:auto}

.greet{margin:8px 4px 4px}
.greet h1{font-size:26px;font-weight:600;letter-spacing:-.02em}
.greet p{color:var(--muted);font-size:13px;margin-top:3px}

.chips{display:flex;gap:10px;margin:14px 0 14px}
.chip{flex:1;background:var(--elev);border:1px solid var(--line);border-radius:15px;padding:11px 13px}
.chip .k{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.chip .v{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:18px;margin-top:3px}
.chip .v .fire{color:var(--neon)}

.sec-lbl{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 10px}
.sec-lbl span{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.sec-lbl .add{width:32px;height:32px;border-radius:10px;background:var(--neon);display:grid;place-items:center;transition:transform .2s var(--ease);box-shadow:0 4px 16px rgba(57,255,140,.35)}
.sec-lbl .add:active{transform:scale(.88)}
.sec-lbl .add svg{width:16px;height:16px;stroke:var(--onneon);stroke-width:2.4;fill:none}

/* habit cards — time based */
.habits{display:flex;flex-direction:column;gap:10px}
.hcard{display:flex;align-items:center;gap:13px;background:var(--elev);border:1px solid var(--line);
  border-radius:var(--r);padding:13px 14px;transition:transform .15s var(--ease),border-color .3s;cursor:pointer}
.hcard:active{transform:scale(.985)}
.hcard.running{border-color:rgba(57,255,140,.45)}
.hcard.completed{border-color:rgba(57,255,140,.6);background:linear-gradient(180deg,rgba(57,255,140,.10),var(--elev))}
.hc-icon{width:46px;height:46px;flex:none;border-radius:13px;display:grid;place-items:center;position:relative;overflow:hidden}
.hc-icon svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;position:relative;z-index:1}
.hc-icon img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85}
.hc-body{flex:1;min-width:0}
.hc-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.hc-name{font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hc-pct{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--neon);flex:none}
.hc-bar{height:6px;border-radius:3px;background:var(--elev2);margin-top:8px;overflow:hidden}
.hc-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--neon-dp),var(--neon));width:0%;transition:width .5s var(--ease);position:relative}
.hcard.running .hc-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shine 1.6s linear infinite}
@keyframes shine{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.hc-sub{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px;font-family:'JetBrains Mono',monospace}
.hc-play{width:40px;height:40px;flex:none;border-radius:12px;background:var(--elev2);border:1px solid var(--line);display:grid;place-items:center;transition:.25s var(--ease)}
.hc-play svg{width:17px;height:17px;fill:var(--neon);stroke:none}
.hcard.running .hc-play{background:var(--neon);box-shadow:0 0 16px rgba(57,255,140,.5)}
.hcard.running .hc-play svg{fill:var(--onneon)}
/* ---- odat kartasidagi statistika tugmasi ---- */
.hc-stat{width:40px;height:40px;flex:none;border-radius:12px;background:var(--elev2);border:1px solid var(--line);display:grid;place-items:center;transition:.25s var(--ease)}
.hc-stat svg{width:16px;height:16px;stroke:var(--neon);fill:none;stroke-width:2.2;stroke-linecap:round}
.hc-stat:active{transform:scale(.9)}
/* ---- odat detal / statistika overlay ---- */
.detail{position:fixed;inset:0;z-index:120;background:var(--bg);transform:translateY(100%);transition:transform .45s var(--ease);overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom) + 40px)}
.detail.open{transform:translateY(0)}
.detail .d-head{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 16px) 20px 14px;z-index:2;border-bottom:1px solid var(--line)}
.d-close{width:38px;height:38px;flex:none;border-radius:11px;background:var(--elev2);border:1px solid var(--line);display:grid;place-items:center}
.d-close svg{width:20px;height:20px;stroke:var(--text);fill:none;stroke-width:2}
.d-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;min-width:0}
.d-title span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-ic{width:34px;height:34px;flex:none;border-radius:10px;display:grid;place-items:center}
.d-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.8}
.d-sec{padding:20px 20px 4px}
.d-sec .grid-lbl{margin-bottom:12px}
.d-empty{color:var(--muted);font-size:12.5px;padding:10px 0;text-align:center}
/* heatmap */
.hm-wrap{display:flex;gap:7px;align-items:flex-start;overflow-x:auto;padding-bottom:6px}
.hm-days{display:grid;grid-template-rows:repeat(7,13px);gap:3px;font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex:none}
.hm-days span{display:flex;align-items:center}
.hm{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,13px);grid-auto-columns:13px;gap:3px;flex:none}
.hm .hcell{border-radius:3px;background:var(--elev2)}
.hm .hcell.l1{background:rgba(57,255,140,.25)}
.hm .hcell.l2{background:rgba(57,255,140,.45)}
.hm .hcell.l3{background:rgba(57,255,140,.7)}
.hm .hcell.l4{background:var(--neon-br);box-shadow:0 0 6px rgba(124,255,181,.5)}
.hm .hcell.fut{background:transparent}
.hm .hcell.today{outline:1.5px solid var(--neon-br);outline-offset:1px}
/* score chart */
.d-score-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.d-score-now{font-size:24px;color:var(--neon)}
.d-chart{width:100%;height:132px;display:block}
/* best streaks */
.d-streak{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.d-streak .sk-d{white-space:nowrap;flex:none;width:56px}
.d-streak .sk-d:last-child{text-align:right}
.d-streak .sk-track{flex:1;display:flex}
.d-streak .sk-bar{height:22px;border-radius:6px;background:rgba(57,255,140,.18);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:11px;transition:width .55s var(--ease)}
.d-streak .sk-bar.top{background:var(--neon);color:var(--onneon);box-shadow:0 0 12px rgba(57,255,140,.5)}

.empty{display:flex;flex-direction:column;align-items:center;padding:34px 20px;text-align:center;gap:10px}
.empty .big{font-size:44px}
.empty p{color:var(--muted);font-size:13.5px;max-width:240px;line-height:1.5}

/* stats */
.stat-hero{display:flex;gap:10px;margin:12px 0 16px}
.compare{background:var(--elev);border:1px solid var(--line);border-radius:15px;padding:13px 16px;margin-bottom:16px;font-size:13.5px;line-height:1.5}
.compare b{color:var(--neon)}
.bars{display:flex;align-items:flex-end;gap:8px;height:130px;padding:0 4px;margin-bottom:8px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.bar .fill{width:100%;max-width:26px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--neon),var(--neon-dp));height:0;transition:height 1s var(--ease)}
.bar .fill.today{background:linear-gradient(180deg,var(--text),var(--neon))}
.bar .d{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.grid-lbl{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:16px 4px 10px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.cell{aspect-ratio:1;border-radius:4px;background:var(--elev2);transition:transform .3s var(--ease)}
.cell.l1{background:rgba(57,255,140,.25)}
.cell.l2{background:rgba(57,255,140,.45)}
.cell.l3{background:rgba(57,255,140,.7)}
.cell.l4{background:var(--neon-br);box-shadow:0 0 8px rgba(124,255,181,.55)}
.badges{display:flex;gap:10px;margin-top:4px}
.badge{flex:1;background:var(--elev);border:1px solid var(--line);border-radius:14px;padding:11px 6px;text-align:center}
.badge .bn{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:18px;color:var(--muted)}
.badge .bl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.badge.unlocked{border-color:rgba(57,255,140,.45);background:linear-gradient(180deg,rgba(57,255,140,.12),var(--elev))}
.badge.unlocked .bn{color:var(--neon)}

/* profile */
.profile{display:flex;flex-direction:column;align-items:center;margin:20px 0 18px}
.avatar{width:82px;height:82px;border-radius:24px;display:grid;place-items:center;font-weight:600;font-size:32px;color:var(--onneon);
  background:linear-gradient(135deg,var(--neon-br),var(--neon-dp));box-shadow:0 12px 40px rgba(57,255,140,.3)}
.profile h2{font-size:20px;font-weight:600;margin-top:13px}
.profile p{color:var(--muted);font-size:12.5px;margin-top:3px;font-family:'JetBrains Mono',monospace}
.settings{display:flex;flex-direction:column;gap:10px}
.setting{display:flex;align-items:center;justify-content:space-between;background:var(--elev);border:1px solid var(--line);border-radius:15px;padding:13px 16px}
.setting .lab{display:flex;align-items:center;gap:12px;font-size:14px}
.setting .lab svg{width:19px;height:19px;stroke:var(--neon);fill:none;stroke-width:1.7}
.tog{width:46px;height:27px;border-radius:8px;background:var(--elev2);border:1px solid var(--line);position:relative;transition:.3s var(--ease)}
.tog::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:6px;background:var(--muted);transition:.3s var(--ease)}
.tog.on{background:var(--neon)}
.tog.on::after{left:21px;background:var(--onneon)}
.langseg{display:flex;gap:6px}
.langseg button{padding:7px 11px;border-radius:9px;background:var(--elev2);border:1px solid var(--line);font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);transition:.2s}
.langseg button.sel{background:var(--neon);border-color:var(--neon);color:var(--onneon);font-weight:600}
.logout{width:100%;margin-top:14px;padding:14px;border-radius:14px;border:1px solid rgba(255,120,120,.3);color:var(--danger);font-weight:600;font-size:14px;transition:.2s}
.logout:active{background:rgba(255,120,120,.1)}

/* nav */
.nav{position:absolute;left:0;right:0;bottom:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
  display:flex;background:rgba(4,10,7,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line);z-index:40}
.device[data-theme="light"] .nav{background:rgba(255,255,255,.75)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--muted);transition:color .3s;position:relative}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;transition:transform .3s var(--ease)}
.tab span{font-size:10px}
.tab.on{color:var(--neon)}
.tab.on svg{transform:translateY(-2px)}
.tab.on::before{content:"";position:absolute;top:9px;width:14px;height:3px;border-radius:2px;background:var(--neon);box-shadow:0 0 10px var(--neon)}

/* sheets & overlays */
.scrim{position:absolute;inset:0;background:rgba(0,0,0,.62);opacity:0;pointer-events:none;transition:opacity .35s;z-index:70;backdrop-filter:blur(2px)}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--elev2);border-top:1px solid var(--line);border-radius:26px 26px 0 0;
  padding:18px 22px calc(env(safe-area-inset-bottom) + 20px);transform:translateY(100%);transition:transform .4s var(--ease);z-index:80;max-height:86%;overflow-y:auto;scrollbar-width:none}
.sheet::-webkit-scrollbar{display:none}
.sheet.open{transform:none}
.sheet .grip{width:40px;height:4px;border-radius:2px;background:rgba(120,255,180,.2);margin:0 auto 14px}
.sheet h3{font-size:17px;font-weight:600;margin-bottom:12px}
.f-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
.sheet input[type=text],.sheet input[type=number]{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--text);font-size:15px;outline:none;transition:border .2s;user-select:text;-webkit-user-select:text}
.sheet input:focus{border-color:var(--neon)}
.err{color:var(--danger);font-size:12.5px;margin-top:8px;min-height:16px}
.picks{display:flex;gap:9px;flex-wrap:wrap}
.pick{width:44px;height:44px;border-radius:12px;background:var(--elev);border:1.5px solid var(--line);display:grid;place-items:center;transition:.2s var(--ease)}
.pick svg{width:19px;height:19px;stroke:var(--neon);fill:none;stroke-width:1.7}
.pick.sel{border-color:var(--neon);background:rgba(57,255,140,.14)}
.swatch{width:34px;height:34px;border-radius:50%;border:2.5px solid transparent;transition:.2s}
.swatch.sel{border-color:var(--text);transform:scale(1.12)}
.goalrow{display:flex;align-items:center;gap:12px}
.goalrow button{width:44px;height:44px;border-radius:12px;background:var(--elev);border:1px solid var(--line);font-size:20px;color:var(--neon)}
.goalrow .gval{flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600}
.photo-btn{display:flex;align-items:center;gap:10px;background:var(--elev);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--muted);width:100%}
.photo-btn img{width:34px;height:34px;border-radius:8px;object-fit:cover}
.sheet .save{width:100%;margin-top:18px;padding:15px;border-radius:13px;background:var(--neon);color:var(--onneon);font-weight:600;font-size:15px;transition:transform .2s}
.sheet .save:active{transform:scale(.97)}

/* session overlay */
.session{position:absolute;inset:0;background:var(--bg);z-index:90;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .45s var(--ease)}
.session.open{transform:none}
.s-head{padding:calc(env(safe-area-inset-top) + 16px) 20px 4px;display:flex;align-items:center;justify-content:space-between}
.s-close{width:38px;height:38px;border-radius:12px;background:var(--elev);border:1px solid var(--line);display:grid;place-items:center}
.s-close svg{width:17px;height:17px;stroke:var(--text);stroke-width:2;fill:none}
.s-title{font-weight:600;font-size:16px;display:flex;align-items:center;gap:9px}
.s-title .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center}
.s-title .ic svg{width:14px;height:14px;stroke:#fff;stroke-width:2;fill:none}
.s-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding-bottom:20px}
.s-ring{position:relative;width:280px;height:280px}
.s-ring .breathe{position:absolute;inset:46px;border-radius:50%;background:radial-gradient(circle,rgba(57,255,140,.28),rgba(57,255,140,0) 70%)}
.s-ring.run .breathe{animation:breathe 5s var(--ease) infinite}
@keyframes breathe{0%,100%{transform:scale(.85);opacity:.5}50%{transform:scale(1.1);opacity:1}}
.s-ring svg{position:absolute;inset:0}
.s-ring .seg{stroke:var(--elev2);stroke-width:3;transition:stroke .3s}
.s-ring .seg.on{stroke:var(--neon);filter:drop-shadow(0 0 5px rgba(57,255,140,.9))}
.s-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.s-pct{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:46px}
.s-elapsed{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--neon)}
.s-remain{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.deep{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);min-height:20px;transition:color .3s}
.deep.on{color:var(--neon)}
.s-controls{display:flex;gap:10px;padding:0 22px}
.s-btn{padding:14px 0;border-radius:14px;font-weight:600;font-size:14px;transition:transform .2s var(--ease)}
.s-btn:active{transform:scale(.95)}
.s-main{flex:2;background:var(--neon);color:var(--onneon);box-shadow:0 8px 30px rgba(57,255,140,.35)}
.s-fin{flex:1;background:var(--elev);border:1px solid var(--line)}
.s-extra{display:flex;gap:10px;padding:12px 22px 0;justify-content:center}
.s-chipbtn{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:999px;background:var(--elev);border:1px solid var(--line);font-size:12px;color:var(--muted);transition:.25s}
.s-chipbtn.on{color:var(--neon);border-color:rgba(57,255,140,.4)}
.s-chipbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

/* achievement overlay */
.ach{position:absolute;inset:0;z-index:120;background:rgba(2,8,4,.88);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .4s}
.ach.open{opacity:1;pointer-events:auto}
.ach .medal{font-size:74px;animation:pop .7s var(--ease)}
@keyframes pop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.ach h2{font-size:24px;font-weight:700}
.ach p{color:var(--neon);font-family:'JetBrains Mono',monospace;font-size:14px}
.ach button{margin-top:8px;padding:13px 34px;border-radius:13px;background:var(--neon);color:var(--onneon);font-weight:600}
#confetti{position:absolute;inset:0;pointer-events:none}

/* ---------- fullscreen flows: splash / onboarding / auth ---------- */
.flow{position:absolute;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;transition:opacity .6s var(--ease),transform .6s var(--ease)}
.flow.gone{opacity:0;pointer-events:none;transform:translateY(-14px)}
.splash{justify-content:center;padding:0 34px;gap:4px;background:#020604}
.boot{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#5f7a68;min-height:19px;opacity:0}
.boot .ok{color:#39FF8C}
.boot.show{opacity:1}
.sp-logo{font-weight:700;font-size:30px;letter-spacing:.34em;margin:22px 0 4px;min-height:40px;color:#EAFBF0}
.sp-logo b{color:#39FF8C;text-shadow:0 0 18px rgba(57,255,140,.6)}
.sp-logo .cur{display:inline-block;width:.55em;height:1em;background:#39FF8C;vertical-align:-.12em;animation:blink .9s steps(1) infinite;margin-left:2px}

.onb{padding:calc(env(safe-area-inset-top) + 18px) 0 calc(env(safe-area-inset-bottom) + 24px)}
.onb-skip{position:absolute;top:calc(env(safe-area-inset-top) + 18px);right:22px;font-size:13px;color:var(--muted);padding:8px 12px;z-index:2}
.onb-track{flex:1;display:flex;transition:transform .45s var(--ease)}
.onb-slide{min-width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:0 36px;text-align:center}
.onb-art{font-size:74px;filter:drop-shadow(0 0 24px rgba(57,255,140,.35))}
.onb-slide h2{font-size:24px;font-weight:700;line-height:1.2}
.onb-slide h2 b{color:var(--neon)}
.onb-slide p{color:var(--muted);font-size:14px;line-height:1.6;max-width:280px}
.onb-dots{display:flex;gap:8px;justify-content:center;margin:18px 0}
.onb-dots i{width:8px;height:8px;border-radius:4px;background:var(--elev2);transition:.3s var(--ease)}
.onb-dots i.on{width:24px;background:var(--neon)}
.onb-next{margin:0 24px;padding:15px;border-radius:14px;background:var(--neon);color:var(--onneon);font-weight:600;font-size:15px}

.auth{justify-content:center;padding:0 28px;gap:6px}
.auth h2{font-size:27px;font-weight:700;margin-bottom:4px;text-align:center}
.auth h2 b{color:var(--neon)}
.auth .sub{color:var(--muted);font-size:13.5px;margin-bottom:24px;line-height:1.6;text-align:center}
.name-row{display:flex;align-items:center;gap:12px;background:var(--elev);border:1px solid var(--line);border-radius:16px;padding:10px 12px;transition:border-color .25s,box-shadow .25s}
.name-row:focus-within{border-color:var(--neon);box-shadow:0 0 0 3px rgba(57,255,140,.12)}
.name-row .av{width:44px;height:44px;flex:none;border-radius:13px;display:grid;place-items:center;font-weight:600;font-size:19px;color:var(--onneon);
  background:linear-gradient(135deg,var(--neon-br),var(--neon-dp));transition:transform .25s var(--ease)}
.name-row .av.live{transform:scale(1.06)}
.auth input{flex:1;background:none;border:none;padding:10px 4px;color:var(--text);font-size:16px;outline:none;user-select:text;-webkit-user-select:text;min-width:0}
.auth .go{margin-top:16px;padding:16px;border-radius:15px;background:var(--neon);color:var(--onneon);font-weight:600;font-size:15px;
  box-shadow:0 8px 30px rgba(57,255,140,.3);display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .2s var(--ease)}
.auth .go:active{transform:scale(.97)}
.auth .go svg{width:17px;height:17px;stroke:var(--onneon);stroke-width:2.4;fill:none;transition:transform .25s var(--ease)}
.auth .go:active svg{transform:translateX(4px)}
.auth .hint{margin-top:16px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.7}
.auth .hint b{color:var(--neon);font-weight:500}

.reduce .dot,.reduce .clock::after,.reduce .s-ring.run .breathe,.reduce .hcard.running .hc-fill::after{animation:none!important}
.reduce *{transition-duration:.001s!important}

/* ---------- v2 qo'shimchalar ---------- */
.badges{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.badge{padding:9px 2px}
.badge .bn{font-size:15px}
.badge .bl{font-size:8px}
.badge.locked{opacity:.45}
.badge.locked .bn::after{content:" 🔒";font-size:9px}
.badge.reveal{animation:bReveal .8s var(--ease)}
@keyframes bReveal{0%{transform:scale(.4) rotate(-8deg);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1)}}

.ambi{display:flex;gap:8px;padding:10px 22px 0;overflow-x:auto;scrollbar-width:none;justify-content:flex-start;width:100%}
.ambi::-webkit-scrollbar{display:none}
.ambi .s-chipbtn{flex:none}

.typeseg{display:flex;gap:8px}
.typeseg button{flex:1;padding:11px;border-radius:12px;background:var(--elev);border:1px solid var(--line);font-size:13px;transition:.2s}
.typeseg button.sel{background:var(--neon);border-color:var(--neon);color:var(--onneon);font-weight:600}

.session.untimed .s-ring,.session.untimed .deep,.session.untimed .ambi,.session.untimed .s-controls{display:none}
.session.untimed .u-check{display:flex}
.u-check{display:none;flex-direction:column;align-items:center;gap:12px;margin:10px 0 4px}
.u-btn{width:110px;height:110px;border-radius:50%;border:2.5px solid var(--line);background:var(--elev);display:grid;place-items:center;transition:.35s var(--ease)}
.u-btn svg{width:44px;height:44px;stroke:var(--muted);stroke-width:2.6;fill:none;stroke-dasharray:40;stroke-dashoffset:0;transition:.35s}
.u-btn.done{background:var(--neon);border-color:var(--neon);box-shadow:0 0 34px rgba(57,255,140,.55)}
.u-btn.done svg{stroke:var(--onneon)}
.u-lbl{font-size:12px;color:var(--muted)}

/* natija kartasi */
.result{position:absolute;inset:0;z-index:118;background:rgba(2,8,4,.9);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;gap:0;opacity:0;pointer-events:none;transition:opacity .4s}
.result.open{opacity:1;pointer-events:auto}
.r-card{width:100%;max-width:330px;background:linear-gradient(160deg,var(--elev2),var(--elev));border:1px solid rgba(57,255,140,.3);
  border-radius:24px;padding:24px 22px;text-align:center;box-shadow:0 24px 70px rgba(57,255,140,.18);animation:pop .6s var(--ease)}
.r-card .rt{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted)}
.r-card .rtime{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:44px;margin:8px 0 2px;color:var(--neon);text-shadow:0 0 22px rgba(57,255,140,.5)}
.r-card .rname{font-size:14px;color:var(--text);margin-bottom:14px}
.r-row{display:flex;gap:8px;margin:12px 0}
.r-stat{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:9px 4px}
.r-stat .n{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px;color:var(--neon)}
.r-stat .l{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.r-quote{font-size:12.5px;color:var(--muted);line-height:1.6;font-style:italic;margin-top:6px}
.r-actions{display:flex;gap:10px;margin-top:16px}
.r-actions .s-btn{flex:1}
.r-share{background:var(--neon);color:var(--onneon);box-shadow:0 6px 24px rgba(57,255,140,.35)}
.r-close{background:var(--bg);border:1px solid var(--line)}

/* mastery */
.mastery{background:var(--elev);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin:4px 0 14px}
.m-top{display:flex;justify-content:space-between;align-items:baseline}
.m-lvl{font-weight:600;font-size:15px}
.m-lvl b{color:var(--neon)}
.m-hrs{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.m-bar{height:6px;border-radius:3px;background:var(--elev2);margin-top:10px;overflow:hidden}
.m-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--neon-dp),var(--neon));transition:width 1s var(--ease)}
.wisdom{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.w-card{aspect-ratio:1/.86;border-radius:13px;background:var(--elev);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;font-size:10.5px;line-height:1.45;color:var(--text);transition:.3s}
.w-card.locked{color:transparent;background:repeating-linear-gradient(45deg,var(--elev) 0 6px,var(--elev2) 6px 12px);position:relative}
.w-card.locked::after{content:"🔒";position:absolute;inset:0;display:grid;place-items:center;font-size:16px;opacity:.5}
#trace{width:100%;height:110px;border-radius:14px;background:var(--elev);border:1px solid var(--line)}

/* budilnik */
.alarm{position:absolute;inset:0;z-index:130;background:#050b07;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center}
.alarm.open{display:flex}
.alarm .aico{font-size:56px;animation:shake .5s linear infinite}
@keyframes shake{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
.alarm h2{font-size:22px;font-weight:700}
.alarm .prob{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:var(--neon);margin:6px 0}
.alarm input{width:150px;background:var(--elev);border:1px solid var(--line);border-radius:13px;padding:14px;color:var(--text);
  font-size:24px;text-align:center;outline:none;font-family:'JetBrains Mono',monospace;user-select:text;-webkit-user-select:text}
.alarm input:focus{border-color:var(--neon)}
.alarm .a-ok{padding:14px 40px;border-radius:13px;background:var(--neon);color:var(--onneon);font-weight:600;font-size:15px}
.alarm .a-esc{font-size:12px;color:var(--danger);text-decoration:underline;display:none}
.alarm .a-esc.show{display:block}
.alarm .aerr{color:var(--danger);font-size:13px;min-height:18px}

/* PIN qulf */
.pinlock{position:absolute;inset:0;z-index:140;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pinlock.open{display:flex}
.pinlock h2{font-size:19px;font-weight:600}
.pin-dots{display:flex;gap:14px;margin:4px 0 8px}
.pin-dots i{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--line);transition:.2s}
.pin-dots i.f{background:var(--neon);border-color:var(--neon);box-shadow:0 0 10px rgba(57,255,140,.6)}
.pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pad button{height:64px;border-radius:18px;background:var(--elev);border:1px solid var(--line);font-size:22px;font-family:'JetBrains Mono',monospace;transition:.15s}
.pad button:active{background:var(--elev2);transform:scale(.94)}
.pin-err{color:var(--danger);font-size:13px;min-height:18px}

/* AI murabbiy */
.coach{background:var(--elev);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-top:14px}
.coach .c-top{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;margin-bottom:8px}
.coach .c-msg{font-size:13px;line-height:1.65;color:var(--text);min-height:20px}
.coach .c-msg.dim{color:var(--muted)}
.coach button{margin-top:12px;padding:11px 18px;border-radius:11px;background:var(--neon);color:var(--onneon);font-weight:600;font-size:13px}
.coach button:disabled{opacity:.5}

/* ---------- WOW qatlami ---------- */
.view{transform:translateY(14px) scale(.985)}
.view.active{transform:none}

#aurora{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1.2s var(--ease)}
.session.open #aurora{opacity:1}

/* Zen — sessiyada hamma narsa eriydi, faqat vaqt va aurora qoladi */
.session .s-head,.session .ambi,.session .s-controls,.session .deep,
.session .s-body>div[style],.session .s-remain,.session .s-pct{transition:opacity .9s var(--ease)}
.session .s-ring{transition:transform 1.1s var(--ease)}
.session .s-ring svg{transition:opacity .9s var(--ease)}
.session .s-elapsed{transition:all 1.1s var(--ease)}
.session.zen .s-head,.session.zen .ambi,.session.zen .s-controls,.session.zen .deep,
.session.zen .s-body>div[style]{opacity:0;pointer-events:none}
.session.zen .s-ring{transform:scale(1.12)}
.session.zen .s-ring svg{opacity:.22}
.session.zen .s-pct{opacity:0}
.session.zen .s-remain{opacity:.45}
.session.zen .s-elapsed{font-size:40px;color:var(--text);text-shadow:0 0 30px rgba(57,255,140,.35);letter-spacing:.02em}
.zen-hint{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 22px);left:0;right:0;text-align:center;
  font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .9s;pointer-events:none}
.session.zen .zen-hint{opacity:.55}

/* jonli pill — ishlayotgan taymer indikatori */
.pill{position:absolute;left:50%;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);transform:translate(-50%,80px);
  display:flex;align-items:center;gap:9px;padding:9px 16px 9px 12px;border-radius:999px;z-index:45;
  background:rgba(10,20,13,.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(57,255,140,.3);box-shadow:0 10px 34px rgba(0,0,0,.5),0 0 22px rgba(57,255,140,.12);
  transition:transform .55s var(--ease),opacity .4s;opacity:0;pointer-events:none;cursor:pointer;max-width:78%}
.device[data-theme="light"] .pill{background:rgba(255,255,255,.82)}
.pill.show{transform:translate(-50%,0);opacity:1;pointer-events:auto}
.pill:active{transform:translate(-50%,0) scale(.95)}
.pill .pdot{width:8px;height:8px;border-radius:50%;background:var(--neon);box-shadow:0 0 10px var(--neon);animation:pillPulse 1.6s var(--ease) infinite;flex:none}
@keyframes pillPulse{50%{transform:scale(1.5);opacity:.6}}
.pill .pname{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill .ptime{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--neon);flex:none}
.reduce .pill .pdot{animation:none}
</style>
</head>
<body>
<div class="device" id="device" data-theme="dark">
  <div class="scanlines"></div>

  <!-- SPLASH -->
  <div class="flow splash" id="splash">
    <div class="boot" data-t="&gt; boot focus.engine ............ <span class='ok'>OK</span>"></div>
    <div class="boot" data-t="&gt; load timers.db ............... <span class='ok'>OK</span>"></div>
    <div class="boot" data-t="&gt; restore sessions ............. <span class='ok'>OK</span>"></div>
    <div class="sp-logo" id="spLogo"><span class="cur"></span></div>
  </div>

  <!-- ONBOARDING -->
  <div class="flow onb gone" id="onb">
    <button class="onb-skip" id="onbSkip"></button>
    <div class="onb-track" id="onbTrack">
      <div class="onb-slide"><div class="onb-art">⏱️</div><h2 data-i18n="ob1t"></h2><p data-i18n="ob1p"></p></div>
      <div class="onb-slide"><div class="onb-art">📊</div><h2 data-i18n="ob2t"></h2><p data-i18n="ob2p"></p></div>
      <div class="onb-slide"><div class="onb-art">🏆</div><h2 data-i18n="ob3t"></h2><p data-i18n="ob3p"></p></div>
    </div>
    <div class="onb-dots" id="onbDots"><i class="on"></i><i></i><i></i></div>
    <button class="onb-next" id="onbNext"></button>
  </div>

  <!-- AUTH (guest) -->
  <div class="flow auth gone" id="auth">
    <h2 data-i18n="auth_title"></h2>
    <div class="sub" data-i18n="auth_sub"></div>
    <div class="name-row">
      <div class="av" id="authAv">?</div>
      <input id="authName" type="text" maxlength="20" autocomplete="off">
    </div>
    <div class="err" id="authErr"></div>
    <button class="go" id="authGo"><span data-i18n="auth_go"></span><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    <div class="hint" data-i18n="auth_hint"></div>
  </div>

  <div class="head">
    <div class="brand"><span class="dot"></span>FOCUS <b>AI</b></div>
    <div class="clock mono" id="clock"></div>
  </div>

  <div class="views">
    <!-- DASHBOARD -->
    <section class="view active" id="v-home">
      <div class="greet"><h1 id="greetTxt"></h1><p data-i18n="tagline"></p></div>
      <div class="chips">
        <div class="chip"><div class="k" data-i18n="streak"></div><div class="v"><span class="fire">🔥</span> <span id="streakN">0</span></div></div>
        <div class="chip"><div class="k" data-i18n="today_time"></div><div class="v" id="todayTime">0m</div></div>
        <div class="chip"><div class="k" data-i18n="growth"></div><div class="v" id="gPct">0%</div></div>
      </div>
      <div class="sec-lbl"><span data-i18n="my_habits"></span>
        <button class="add" id="addBtn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div class="habits" id="habitList"></div>
    </section>

    <!-- FOCUS TIMER -->
    <section class="view" id="v-focus">
      <div class="greet" style="text-align:center"><h1 style="font-size:23px" data-i18n="focus_title"></h1><p data-i18n="focus_sub"></p></div>
      <div class="ring-wrap" style="display:flex;justify-content:center;margin:18px 0 6px">
        <div class="s-ring" id="fRing" style="width:262px;height:262px">
          <div class="breathe"></div>
          <svg id="fRingSvg" viewBox="0 0 200 200"></svg>
          <div class="s-center">
            <div class="s-pct mono" id="fTime" style="font-size:44px">25:00</div>
            <div class="s-remain" id="fState"></div>
          </div>
        </div>
      </div>
      <div class="s-extra" style="padding:4px 0 14px">
        <button class="s-chipbtn preset sel" data-min="25">25:00</button>
        <button class="s-chipbtn preset" data-min="50">50:00</button>
        <button class="s-chipbtn preset" data-min="90">90:00</button>
      </div>
      <div class="s-controls" style="padding:0 2px">
        <button class="s-btn s-fin" id="fReset" data-i18n="reset"></button>
        <button class="s-btn s-main" id="fStart"></button>
      </div>
    </section>

    <!-- STATS -->
    <section class="view" id="v-stats">
      <div class="greet"><h1 style="font-size:24px" data-i18n="momentum"></h1><p data-i18n="momentum_sub"></p></div>
      <div class="stat-hero">
        <div class="chip"><div class="k" data-i18n="best_streak"></div><div class="v mono" id="stBest">0</div></div>
        <div class="chip"><div class="k" data-i18n="total_hrs"></div><div class="v mono" id="stHrs">0</div></div>
        <div class="chip"><div class="k" data-i18n="done_goals"></div><div class="v mono" id="stDone">0</div></div>
      </div>
      <div class="compare" id="compare"></div>
      <div class="sec-lbl"><span data-i18n="week"></span></div>
      <div class="bars" id="bars"></div>
      <div class="grid-lbl" data-i18n="weeks8"></div>
      <div class="grid" id="grid"></div>
      <div class="grid-lbl" data-i18n="achievements"></div>
      <div class="badges" id="badges"></div>
      <div class="grid-lbl" data-i18n="mastery"></div>
      <div class="mastery">
        <div class="m-top"><div class="m-lvl" id="mLvl"></div><div class="m-hrs mono" id="mHrs"></div></div>
        <div class="m-bar"><div class="m-fill" id="mFill"></div></div>
      </div>
      <div class="grid-lbl" data-i18n="wisdom"></div>
      <div class="wisdom" id="wisdom"></div>
      <div class="grid-lbl" data-i18n="trace"></div>
      <canvas id="trace"></canvas>
      <div class="coach">
        <div class="c-top">🤖 <span data-i18n="coach"></span></div>
        <div class="c-msg dim" id="coachMsg"></div>
        <button id="coachBtn" data-i18n="coach_btn"></button>
      </div>
    </section>

    <!-- PROFILE -->
    <section class="view" id="v-you">
      <div class="profile">
        <div class="avatar" id="avatar">?</div><h2 id="profName"></h2><p id="profSub"></p>
      </div>
      <div class="settings">
        <div class="setting"><div class="lab"><svg viewBox="0 0 24 24"><path d="M3 5h12M9 3v2M10 19l4-9 4 9M11.5 15.5h5"/><path d="M5 9c0 4 3 7 7 8M11 9c0 4-3 7-7 8"/></svg><span data-i18n="lang"></span></div>

var ac;
function AC(){ac=ac||new (window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac;}
function tone(f,d,w,t){
  if(!soundOn)return;
  try{var a=AC(),at=a.currentTime+(w||0),o=a.createOscillator(),g=a.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,at);g.gain.linearRampToValueAtTime(.05,at+.02);
    g.gain.exponentialRampToValueAtTime(.0001,at+d);

  }catch(e){}
}

var ambient={cur:null,nodes:[]};
function ambStopAll(){
  ambient.nodes.forEach(function(n){try{n.stop?n.stop():n.disconnect();}catch(e){}});
  ambient.nodes=[];ambient.cur=null;
  $$('#ambi .s-chipbtn').forEach(function(b){b.classList.remove('on');});
}
function noiseBuf(a){var len=2*a.sampleRate,buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<len;i++)d[i]=Math.random()*2-1;return buf;}
function ambStart(kind){
  try{
    var a=AC();
    if(ambient.cur===kind){ambStopAll();return;}
    ambStopAll();ambient.cur=kind;
    var g=a.createGain();g.gain.value=.05;g.connect(a.destination);ambient.nodes.push(g);
    function noise(filt,q,gain){
      var src=a.createBufferSource();src.buffer=noiseBuf(a);src.loop=true;
      var f=a.createBiquadFilter();f.type=filt.type;f.frequency.value=filt.f;if(q)f.Q.value=q;
      var gg=a.createGain();gg.gain.value=gain||1;
      src.connect(f);f.connect(gg);gg.connect(g);src.start();
      ambient.nodes.push(src);return {f:f,g:gg};
    }
    function lfo(target,rate,depth,base){
      var o=a.createOscillator(),og=a.createGain();
      o.frequency.value=rate;og.gain.value=depth;
      o.connect(og);og.connect(target);
      if(base!==undefined)target.value=base;
      o.start();ambient.nodes.push(o);
    }
    if(kind==='rain'){noise({type:'lowpass',f:900});}
    else if(kind==='fire'){var n=noise({type:'lowpass',f:400},null,.9);lfo(n.g.gain,7,.5,.6);lfo(n.f.frequency,3,180,400);}
    else if(kind==='ocean'){var o1=noise({type:'lowpass',f:500});lfo(o1.g.gain,.14,.45,.55);lfo(o1.f.frequency,.09,260,480);}
    else if(kind==='stream'){noise({type:'bandpass',f:1400},1.2,.8);noise({type:'lowpass',f:500},null,.35);}
    else if(kind==='wind'){var w=noise({type:'bandpass',f:300},.7);lfo(w.f.frequency,.11,170,320);lfo(w.g.gain,.17,.35,.6);}
    else if(kind==='white'){noise({type:'highpass',f:60},null,.5);}
    else if(kind==='birds'){
      noise({type:'lowpass',f:350},null,.25);
      var alive=true,tm={stop:function(){alive=false;}};ambient.nodes.push(tm);
      (function chirp(){
        if(!alive||ambient.cur!=='birds')return;
        var o=a.createOscillator(),og=a.createGain(),t=a.currentTime;
        o.type='sine';var f0=1800+Math.random()*1600;
        o.frequency.setValueAtTime(f0,t);
        o.frequency.exponentialRampToValueAtTime(f0*(1.2+Math.random()*.5),t+.07);
        o.frequency.exponentialRampToValueAtTime(f0*.9,t+.14);
        og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(.9,t+.02);
        og.gain.exponentialRampToValueAtTime(.001,t+.18);
        o.connect(og);og.connect(g);o.start(t);o.stop(t+.2);
        setTimeout(chirp,300+Math.random()*1600);
      })();
    }
    else if(kind==='night'){
      noise({type:'lowpass',f:220},null,.3);
      var alive2=true,tm2={stop:function(){alive2=false;}};ambient.nodes.push(tm2);
      (function cricket(){
        if(!alive2||ambient.cur!=='night')return;
        var t=a.currentTime;
        for(var i=0;i<3;i++){
          var o=a.createOscillator(),og=a.createGain();
          o.type='square';o.frequency.value=4200;
          og.gain.setValueAtTime(0,t+i*.06);og.gain.linearRampToValueAtTime(.25,t+i*.06+.01);
          og.gain.exponentialRampToValueAtTime(.001,t+i*.06+.045);
          o.connect(og);og.connect(g);o.start(t+i*.06);o.stop(t+i*.06+.05);
        }
        setTimeout(cricket,700+Math.random()*1200);
      })();
    }
    var btn=$('#ambi [data-amb="'+kind+'"]');if(btn)btn.classList.add('on');
  }catch(e){}
}

/* ============ TIMER ENGINE — TZ formulasi ============ */
/* elapsed = accMs + (now − runningSince); parallel; manfiy/oshiq yo'q */
function goalMs(h){return h.goalH*3600000;}
function elapsedOf(h,now){
  now=now||Date.now();
  var e=h.accMs+(h.runningSince?Math.max(0,now-h.runningSince):0);
  return Math.min(Math.max(0,e),goalMs(h));
}
function flushDay(h,now){
  now=now||Date.now();
  if(h.runningSince&&h.lastFlush){
    var delta=Math.max(0,now-h.lastFlush);
    h.dayMs[TODAY]=(h.dayMs[TODAY]||0)+delta;
    h.lastFlush=now;
  }
}
function startH(h){
  if(h.completed)return;
  var now=Date.now();
  h.runningSince=now;h.lastFlush=now;h._b=now; /* deep-mode bonus bazasi — pauza vaqtini qo'shmaslik uchun */
  save();sGo();buzz(12);askNotify();
}
function pauseH(h){
  if(!h.runningSince)return;
  var now=Date.now();
  flushDay(h,now);
  h.accMs=Math.min(goalMs(h),h.accMs+Math.max(0,now-h.runningSince));
  h.runningSince=null;h.lastFlush=null;
  save();sTap();buzz(8);
}
function finishH(h,silent){
  if(h.runningSince)pauseH(h);
  if(!silent){sTap();}
  save();
}
function completeH(h){
  pauseH(h);
  h.accMs=goalMs(h);h.completed=true;
  store.wins=(store.wins||0)+1;
  save();
  showAch(h);
  notify(T('ach_t'),T('ach_sub')(h.name));
}
/* qayta ochilganda: ishlab turgan taymerlar davom etadi (offline vaqt bugunga yoziladi) */
store.habits.forEach(function(h){
  if(h.runningSince){var now=Date.now();
    if(h.lastFlush){var delta=Math.max(0,now-h.lastFlush);h.dayMs[TODAY]=(h.dayMs[TODAY]||0)+delta;}
    h.lastFlush=now;
  }
});
save();

/* ============ stats helpers ============ */
function dayTotalMs(day){var s=0;store.habits.forEach(function(h){s+=h.dayMs[day]||0;});
  if(store.focusDayMs&&store.focusDayMs[day])s+=store.focusDayMs[day];return s;}
/* odat kalendari: kun faol = shu odatga >=1 min yozilgan */
function hDayOn(h,day){
  if(h.type==='check')return !!(h.days&&h.days.indexOf(day)!==-1);
  return (h.dayMs[day]||0)>=60000;
}
function hStreak(h){var d=hDayOn(h,TODAY)?TODAY:TODAY-1,n=0;while(hDayOn(h,d)){n++;d--;}return n;}
function hMaxRun(h){
  var keys;
  if(h.type==='check')keys=(h.days||[]).slice().sort(function(a,b){return a-b;});
  else keys=Object.keys(h.dayMs).map(Number).filter(function(d){return h.dayMs[d]>=60000;}).sort(function(a,b){return a-b;});
  var best=0,run=0,prev=null,i;
  for(i=0;i<keys.length;i++){if(keys[i]===prev)continue;run=(prev!==null&&keys[i]===prev+1)?run+1:1;if(run>best)best=run;prev=keys[i];}
  return best;
}
function checksDone(day){var n=0;store.habits.forEach(function(h){if(h.type==='check'&&h.days&&h.days.indexOf(day)!==-1)n++;});return n;}
function dayActive(day){return dayTotalMs(day)>=60000||checksDone(day)>0;}
function dayScore(day){return dayTotalMs(day)+checksDone(day)*30*60000;}
function globalStreak(){
  var d=dayActive(TODAY)?TODAY:TODAY-1,n=0;
  while(dayActive(d)){n++;d--;}
  return n;
}
function bestStreakEver(){
  var days={},h,k,i;
  for(h=0;h<store.habits.length;h++){
    var hb=store.habits[h];
    for(k in hb.dayMs)if(hb.dayMs[k]>=60000)days[k]=1;
    if(hb.type==='check'&&hb.days)for(i=0;i<hb.days.length;i++)days[hb.days[i]]=1;
  }
  if(store.focusDayMs)for(k in store.focusDayMs)if(store.focusDayMs[k]>=60000)days[k]=1;
  var keys=Object.keys(days).map(Number).sort(function(a,b){return a-b;});
  var best=0,run=0,prev=null;
  for(i=0;i<keys.length;i++){run=(prev!==null&&keys[i]===prev+1)?run+1:1;if(run>best)best=run;prev=keys[i];}
  return best;
}
function fmtHM(ms){
  var m=Math.floor(ms/60000),h=Math.floor(m/60);m=m%60;
  return h?(h+'h '+(m<10?'0':'')+m+'m'):(m+'m');
}
function fmtHMS(ms){
  var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60;
  function p(x){return (x<10?'0':'')+x;}
  return p(h)+':'+p(m)+':'+p(ss);
}

function fmtDate(d){var dt=new Date((d*86400000)+new Date().getTimezoneOffset()*60000);
  function p(n){return (n<10?'0':'')+n;}
  return p(dt.getDate())+'.'+p(dt.getMonth()+1)+'.'+String(dt.getFullYear()).slice(2);}
/* kunlik qiymat: belgilash = binar, vaqtli = vaqt bilan vaznli (1 soat = to'liq) */
function habitDayValue(h,d){
  if(h.type==='check')return hDayOn(h,d)?1:0;
  return Math.min(1,(h.dayMs[d]||0)/3600000);
}
function habitFirstDay(h){
  var min=null,k;
  if(h.type==='check'){(h.days||[]).forEach(function(d){if(min===null||d<min)min=d;});}
  else{for(k in h.dayMs){var d=Number(k);if(h.dayMs[k]>0&&(min===null||d<min))min=d;}}
  return min;
}
/* odat kuchi: eksponensial silliqlash (EMA). alpha ~0.052 — mukammal kunlik: 30k=80%, 60k=96%, 90k=99% */
function habitScoreSeries(h){
  var first=habitFirstDay(h);if(first===null)return [];
  var ALPHA=1-Math.pow(0.2,1/30),s=0,out=[];
  for(var d=first;d<=TODAY;d++){s+=ALPHA*(habitDayValue(h,d)-s);out.push({d:d,v:s});}
  return out;
}
function calLevel(h,d){

function renderScoreChart(h){
  var svg=$('#dChart'),series=habitScoreSeries(h),now=$('#dScoreNow');
  if(series.length<2){svg.innerHTML='';now.textContent=series.length?Math.round(series[0].v*100)+'%':'0%';$('#dScoreEmpty').style.display='block';return;}
  $('#dScoreEmpty').style.display='none';
  var cur=series[series.length-1].v;now.textContent=Math.round(cur*100)+'%';
  var W=320,H=120,pad=6,n=series.length;
  function X(i){return pad+(i/(n-1))*(W-2*pad);}
  function Y(v){return pad+(1-v)*(H-2*pad);}
  var grid='';[0,.25,.5,.75,1].forEach(function(g){var y=Y(g);grid+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';});
  var pts=series.map(function(p,i){return X(i).toFixed(1)+','+Y(p.v).toFixed(1);}).join(' ');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.innerHTML=grid+
    '<polyline points="'+pts+'" fill="none" stroke="var(--neon)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 4px rgba(57,255,140,.55))"/>'+
    '<circle cx="'+X(n-1).toFixed(1)+'" cy="'+Y(cur).toFixed(1)+'" r="3.6" fill="var(--neon-br)"/>';
}
function habitStreaks(h){
  var keys=[],k;
  if(h.type==='check')keys=(h.days||[]).map(Number);
  else{for(k in h.dayMs)if(h.dayMs[k]>=60000)keys.push(Number(k));}
  keys.sort(function(a,b){return a-b;});
  var runs=[],start=null,prev=null,i;
  for(i=0;i<keys.length;i++){
    if(keys[i]===prev)continue;
    if(prev!==null&&keys[i]===prev+1)prev=keys[i];
    else{if(start!==null)runs.push({s:start,e:prev,len:prev-start+1});start=keys[i];prev=keys[i];}
  }
  if(start!==null)runs.push({s:start,e:prev,len:prev-start+1});
  runs.sort(function(a,b){return b.len-a.len;});
  return runs;
}
function renderStreaks(h){
  var box=$('#dStreaks'),runs=habitStreaks(h);

}

var fDur=25*60000,fEndAt=null,fPausedRemain=fDur,fRunning=false,fLastMin=-1,fStateK='ready',fStartRemain=fDur;
function fRemain(){return fRunning?Math.max(0,fEndAt-Date.now()):fPausedRemain;}
function fFmt(ms){var s=Math.ceil(ms/1000),m=Math.floor(s/60),ss=s%60;return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}

function totalHours(){

  for(h=0;h<store.habits.length;h++)for(k in store.habits[h].dayMs)tot+=store.habits[h].dayMs[k];
  if(store.focusDayMs)for(k in store.focusDayMs)tot+=store.focusDayMs[k];
  return tot/3600000;
}
var LVL_TH=[0,50,250,1000,5000,10000]; /* 10 000 soat qoidasi: Afsona = 10 000 soat */
function levelIdx(){var h=totalHours(),i=0;while(i<LVL_TH.length-1&&h>=LVL_TH[i+1])i++;return i;}
function renderMastery(){
  var h=totalHours(),li=levelIdx(),names=T('lvls');
  $('#mLvl').innerHTML='<b>'+names[li]+'</b>'+(li<names.length-1?' → '+names[li+1]:'');
  var next=li<LVL_TH.length-1?LVL_TH[li+1]:LVL_TH[li];
  var frac=li<LVL_TH.length-1?Math.min(1,(h-LVL_TH[li])/(next-LVL_TH[li])):1;
  $('#mHrs').textContent=h.toFixed(1)+' / '+fmtNum(next)+' h';
  $('#mFill').style.width=(frac*100)+'%';
  var w=$('#wisdom');w.innerHTML='';

    c.className='w-card'+(open?'':' locked');

  });

function drawTrace(){
  var c=$('#trace');if(!c)return;
  var r=c.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);
  c.width=r.width*dpr;c.height=110*dpr;
  var x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);
  x.clearRect(0,0,r.width,110);
  var mins=Math.floor(totalHours()*60),C=neonRGB();
  if(mins<1)return;
  var seed=mins,rnd=RNG(seed*7919+13);
  var px=14,py=88,ang=-0.5,steps=Math.min(420,20+mins);
  x.lineWidth=1.4;x.lineCap='round';
  x.shadowColor='rgba('+C+',.7)';x.shadowBlur=4;
  x.beginPath();x.moveTo(px,py);
  for(var i=0;i<steps;i++){
    ang+=(rnd()-.48)*0.7;
    var len=3+rnd()*7;
    px+=Math.cos(ang)*len;py+=Math.sin(ang)*len*0.6;
    if(px>r.width-12){px=r.width-12;ang=Math.PI-ang;}
    if(px<12){px=12;ang=Math.PI-ang;}
    if(py>96){py=96;ang=-ang;}
    if(py<14){py=14;ang=-ang;}
    x.strokeStyle='rgba('+C+','+(0.25+0.6*(i/steps))+')';
    x.lineTo(px,py);x.stroke();x.beginPath();x.moveTo(px,py);
  }
  x.shadowBlur=8;
  x.fillStyle='rgba('+C+',.95)';
  x.beginPath();x.arc(px,py,3,0,7);x.fill();
}

function hashPin(p,cb){
  try{
    crypto.subtle.digest('SHA-256',new TextEncoder().encode('fai:'+p)).then(function(buf){
      var arr=Array.prototype.slice.call(new Uint8Array(buf));
      cb(arr.map(function(b){return ('0'+b.toString(16)).slice(-2);}).join(''));
    }).catch(function(){cb('x'+p.length+p);});
  }catch(e){cb('x'+p.length+p);}
}

function pinRender(){
  $$('#pinDots i').forEach(function(d,i){d.classList.toggle('f',i<pinBuf.length);});

/* aurora — sessiya fonida nafas oluvchi nur pardasi */
var auCv=$('#aurora'),auCtx=auCv.getContext('2d'),auRAF=null;
function auroraSize(){
  var r=$('#session').getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,1.5);
  auCv.width=r.width*dpr;auCv.height=r.height*dpr;
  auCtx.setTransform(dpr,0,0,dpr,0,0);
  auCv._w=r.width;auCv._h=r.height;
}
function auroraLoop(t){
  if(!sessionOpen){auRAF=null;return;}
  auRAF=requestAnimationFrame(auroraLoop);
  if(reduce)return;
  var w=auCv._w,h=auCv._h,C=neonRGB();
  auCtx.clearRect(0,0,w,h);
  auCtx.globalCompositeOperation='lighter';
  var zen=$('#session').classList.contains('zen'),amp=zen?1:.45;
  for(var i=0;i<3;i++){
    var ph=t*0.00016+i*2.1;
    var x=w/2+Math.sin(ph)*w*0.28;
    var y=h*0.44+Math.cos(ph*0.8+i)*h*0.2;
    var rr=(h*0.32)*(0.8+0.25*Math.sin(t*0.0004+i*1.7));
    var g=auCtx.createRadialGradient(x,y,0,x,y,rr);
    g.addColorStop(0,'rgba('+C+','+(0.10*amp)+')');
    g.addColorStop(0.5,'rgba('+C+','+(0.045*amp)+')');
    g.addColorStop(1,'rgba('+C+',0)');
    auCtx.fillStyle=g;
    auCtx.beginPath();auCtx.arc(x,y,rr,0,7);auCtx.fill();
  }
  auCtx.globalCompositeOperation='source-over';
}
